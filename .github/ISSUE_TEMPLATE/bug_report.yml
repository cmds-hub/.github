# .github/ISSUE_TEMPLATE/bug_report.yml
name: "Fix request"
description: "Repair a problem in the project"
title: "[Repair] "
labels: ["repair"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the problem
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear explanation of what you expected to happen
    validations:
      required: false
