# .github/ISSUE_TEMPLATE/fix_request.yml
name: "🪲 Fix request"
description: "Fix a problem in the project"
title: "[Repair] "
labels: ["repair"]
body:
  - type: textarea
    id: description
    attributes:
      label: Problem
      description: A clear description of the problem
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Steps to reproduce the problem
      placeholder: |
        1. Go to '...'
        2. Click '...'
        3. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Solution
      description: A clear explanation of the expected behaviour
    validations:
      required: false
